name: Deploy ID Check Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/id-check/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker/id-check
          environment: production
